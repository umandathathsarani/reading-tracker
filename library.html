            <p>All intercepted reading transmissions, categorized and stored.</p>
        </header>

        <section id="library-grid" class="library-grid">

        <div id="delete-modal" class="modal hidden">
            <div class="modal-content">

                <div class="modal-actions">
                    <button type="button" id="confirm-delete" class="action-btn btn-delete">Confirm Purge</button>
                    <button type="button" id="cancel-delete" class="action-btn btn-update">Cancel</button>

            </div>
        </div>
